<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EPUB Translator</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}?v=4">
  </head>
  <body>
    <div class="app-shell">
      {% set nav_current = 'upload' %}
      {% include "_sidebar.html" %}
      <main class="page">
        <section class="upload-panel">
          <p class="eyebrow">Phase 1</p>
          <h1>EPUB Translator</h1>
          <p class="intro">Upload an EPUB file to start a local translation job.</p>

          {% if error %}
            <div class="alert error" role="alert">{{ error }}</div>
          {% endif %}

          {% if uploaded_file %}
            <div class="alert success" role="status">
              <strong>{{ uploaded_file.original_name }}</strong> was uploaded successfully.
            </div>
          {% endif %}

          <form action="/upload" method="post" enctype="multipart/form-data">
            <label for="file">EPUB file</label>
            <input id="file" name="file" type="file" accept=".epub,application/epub+zip" required>
            <button type="submit">Upload EPUB</button>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
